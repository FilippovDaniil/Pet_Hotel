server {
    listen 80;                          # порт 80 — стандартный HTTP
    server_name localhost;              # имя хоста (в Docker Compose — имя контейнера)
    root /usr/share/nginx/html;        # директория со статикой (результат npm run build)
    index index.html;                   # файл по умолчанию для директории

    # Прокси для API: все запросы /api/* перенаправляются на api-gateway.
    # В dev-режиме аналог настроен в vite.config.ts.
    location /api/ {
        proxy_pass http://api-gateway:8080;              # имя сервиса из docker-compose.yml
        proxy_set_header Host $host;                     # передаём оригинальный Host заголовок
        proxy_set_header X-Real-IP $remote_addr;         # реальный IP клиента (для логов)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # цепочка прокси-IP
    }

    # SPA fallback: все остальные пути отдают index.html.
    # Это необходимо для React Router — браузер при обновлении страницы (F5)
    # делает GET /bookings/123, но этого файла нет на диске.
    # try_files: сначала ищет файл ($uri), потом директорию ($uri/), иначе → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Включаем gzip-сжатие ответов для ускорения загрузки.
    gzip on;
    # Типы файлов, которые будут сжиматься (JS, CSS, JSON, XML, HTML).
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
