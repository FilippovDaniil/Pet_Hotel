name: CI  # имя отображается в GitHub → Actions → вкладке

# on: когда запускается workflow
on:
  push:
    branches: [master]        # при каждом push в master
  pull_request:
    branches: [master]        # при открытии/обновлении PR в master

# concurrency: отменяет предыдущий запуск на той же ветке при новом push.
# Экономит минуты GitHub Actions: не надо ждать устаревший run.
# На master НЕ отменяем (github.ref == refs/heads/master → cancel-in-progress: false):
#   история прогонов master важна для трекинга качества.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest   # стандартный GitHub-hosted runner: 2 vCPU, 7 GB RAM

    steps:
      # Клонирует репозиторий в runner (обязательный первый шаг).
      - uses: actions/checkout@v4

      # Устанавливает JDK 17 (Eclipse Temurin — основной дистрибутив OpenJDK).
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # Кэширует ~/.gradle/caches и ~/.gradle/wrapper между запусками.
      # Ускоряет сборку: не нужно скачивать зависимости заново (~30–60 секунд экономии).
      - uses: gradle/actions/setup-gradle@v4

      # Сборка без тестов: компиляция + генерация артефактов.
      # -x test: пропускаем тесты — они запускаются отдельным шагом.
      # --parallel: параллельная сборка модулей (все 9 сервисов одновременно).
      - name: Build
        run: ./gradlew build -x test --no-daemon --parallel

      # Unit-тесты всех модулей. IT-тесты исключены (требуют Docker, не запускаем в CI).
      # --no-daemon: не создаём фоновый процесс Gradle (избыточно в одноразовом runner).
      - name: Test
        run: ./gradlew test --no-daemon --parallel

      # Публикуем HTML-отчёты тестов как артефакт сборки при ошибке.
      # if: failure() — только при провале предыдущего шага.
      # retention-days: 7 — артефакт доступен для скачивания 7 дней.
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend  # все run-команды выполняются из папки frontend/

    steps:
      - uses: actions/checkout@v4

      # Node.js 20 LTS. cache: npm — кэширует node_modules по package-lock.json.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci (clean install): воспроизводимая установка строго по package-lock.json.
      # Быстрее npm install; удаляет node_modules перед установкой.
      - name: Install
        run: npm ci

      # ESLint проверяет стиль кода и ловит ошибки (определён в eslint.config.js).
      - name: Lint
        run: npm run lint

      # npm run build включает: tsc --noEmit (type-check) + vite build (бандлинг).
      # Если TypeScript-ошибки или import не найден — шаг упадёт.
      - name: Type-check & build
        run: npm run build
