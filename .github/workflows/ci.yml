name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel previous run for the same branch on new push (but not on master itself)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # Caches ~/.gradle/caches and ~/.gradle/wrapper automatically
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test --no-daemon --parallel

      - name: Test
        run: ./gradlew test --no-daemon --parallel

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # tsc type-check + vite build are both included in `npm run build`
      - name: Type-check & build
        run: npm run build
