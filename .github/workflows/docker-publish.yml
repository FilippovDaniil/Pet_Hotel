name: Docker Publish

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build-and-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    strategy:
      fail-fast: false  # Build remaining services even if one fails
      matrix:
        include:
          - service: customer-service
            context: .
            file: customer-service/Dockerfile
          - service: room-service
            context: .
            file: room-service/Dockerfile
          - service: booking-service
            context: .
            file: booking-service/Dockerfile
          - service: amenity-service
            context: .
            file: amenity-service/Dockerfile
          - service: dining-service
            context: .
            file: dining-service/Dockerfile
          - service: billing-service
            context: .
            file: billing-service/Dockerfile
          - service: api-gateway
            context: .
            file: api-gateway/Dockerfile
          - service: frontend
            context: ./frontend
            file: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates tags: latest (on master), sha-<short>, v1.2.3 (on tag)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pet-hotel-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache persists Docker layer cache between runs
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
